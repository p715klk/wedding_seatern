<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>婚宴帶位即時同步系統 (Vanna&Michael Wedding)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="index_style.css?v=4">
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-12 select-none">

    <header class="bg-red-700 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div class="flex-1 text-center pl-12"> <h1 class="text-xl font-bold tracking-wider">Wedding Guest Manager</h1>
            <p class="text-xs opacity-90 mt-1">EATON HOTEL Maggie 現場即時點名網站</p>
        </div>
        <a href="admin/admin.html" class="bg-red-800 hover:bg-red-900 border border-red-500 text-white px-2.5 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-bold shadow transition shrink-0">
            ⚙️ 後台管理
        </a>
    </header>

    <div class="max-w-xl mx-auto mt-4 px-4">
        <div class="relative">
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="🔍 輸入姓名 / 分類 (如: 男方, LK, Aerial, VPower)..." 
                class="w-full p-3 pl-10 pr-10 rounded-xl border-2 border-red-200 shadow-sm focus:outline-none focus:border-red-500 text-base">
            <button id="clear-search" onclick="clearSearch()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 hidden font-bold">&times;</button>
        </div>
        <div id="search-results" class="mt-2 space-y-2 max-h-64 overflow-y-auto hidden bg-white p-2 rounded-xl shadow-lg border border-gray-200"></div>
    </div>

    <div class="max-w-xl mx-auto mt-4 px-4">
        <div class="bg-gray-300 text-center py-2 rounded font-bold shadow-inner tracking-widest text-gray-700">舞台 STAGE</div>
    </div>

    <div class="max-w-xl mx-auto px-4 pb-4">
        <div id="floor-plan-wrap" class="floor-plan-wrap">
            <main id="floor-plan" aria-label="婚宴枱位平面圖"></main>
        </div>
        <p id="floor-plan-hint" class="hidden text-center text-xs text-gray-400 mt-2">↔↕ 枱位較多，可滑動查看</p>
    </div>

    <div id="guest-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4" data-current-table="">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[85vh] flex flex-col">
            <div class="p-4 bg-red-50 border-b border-red-100 flex justify-between items-center">
                <h2 id="modal-title" class="text-lg font-bold text-red-800">載入中...</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl font-bold px-2">&times;</button>
            </div>
            <div id="modal-content" class="p-4 overflow-y-auto space-y-3 flex-1"></div>
            <div id="modal-footer-action" class="p-3 border-t bg-white"></div>
            <div class="p-4 border-t bg-gray-50 text-right">
                <button onclick="closeModal()" class="bg-gray-500 text-white px-4 py-2 rounded shadow hover:bg-gray-600">關閉</button>
            </div>
        </div>
    </div>

    <script src="index_script.js?v=15"></script>
</body>
</html>
