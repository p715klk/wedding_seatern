<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚宴即時同步帶位系統 (Eaton HK - Maggie Q)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-12">

    <header class="bg-red-700 text-white p-4 shadow-md sticky top-0 z-50 text-center">
        <h1 class="text-xl font-bold tracking-wider">Wedding Guest Manager</h1>
        <p class="text-xs opacity-90 mt-1">逸東酒店 Maggie (玉) 宴會廳 現場即時同步系統</p>
    </header>

    <div class="max-w-xl mx-auto mt-4 px-4">
        <div class="relative">
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="🔍 輸入賓客姓名搜尋..." 
                class="w-full p-3 pl-10 pr-10 rounded-xl border-2 border-red-200 shadow-sm focus:outline-none focus:border-red-500 text-base">
            <button id="clear-search" onclick="clearSearch()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 hidden font-bold">&times;</button>
        </div>
        <div id="search-results" class="mt-2 space-y-2 max-h-60 overflow-y-auto hidden bg-white p-2 rounded-xl shadow-lg border border-gray-200"></div>
    </div>

    <div class="max-w-xl mx-auto mt-4 px-4">
        <div class="bg-gray-300 text-center py-2 rounded font-bold shadow-inner tracking-widest text-gray-700">舞台 STAGE</div>
    </div>

    <main class="max-w-xl mx-auto p-4 grid grid-cols-4 gap-3 text-center" id="floor-plan"></main>

    <div id="guest-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4" data-current-table="">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[85vh] flex flex-col">
            <div class="p-4 bg-red-50 border-b border-red-100 flex justify-between items-center">
                <h2 id="modal-title" class="text-lg font-bold text-red-800">載入中...</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl font-bold px-2">&times;</button>
            </div>
            <div id="modal-content" class="p-4 overflow-y-auto space-y-3 flex-1"></div>
            <div class="p-4 border-t bg-gray-50 text-right">
                <button onclick="closeModal()" class="bg-gray-500 text-white px-4 py-2 rounded shadow hover:bg-gray-600">關閉</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ Firebase 設定
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://wedding-seatern-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🏡 按照你提供的新 Layout 排位
        const layout = [
            ['.', '1', '2', '.'],
            ['.', '3', '4', '.'],
            ['11', '5', '6', '13'],
            ['12', '7', '8', '14'],
            ['.', '9', '10', '.']
        ];

        let dbData = {};     // 存放最原始的賓客名單 (從 Firebase 讀取)
        let statusState = {};// 存放賓客的報到與禮金狀態

        // 渲染大廳桌位平面圖
        const floorPlan = document.getElementById('floor-plan');
        layout.forEach(row => {
            row.forEach(cell => {
                const div = document.createElement('div');
                if (cell === '.') {
                    div.className = "h-20";
                } else {
                    div.className = "bg-white p-2 rounded-xl shadow-md border-2 border-gray-200 flex flex-col justify-between items-center h-24 cursor-pointer hover:border-red-400 transition active:scale-95";
                    div.id = `table-card-${cell}`;
                    div.setAttribute('onclick', `openModal('${cell}')`);
                    div.innerHTML = `
                        <span class="text-sm font-bold text-gray-500">第 ${cell} 桌</span>
                        <div class="w-12 h-12 rounded-full border-4 border-gray-300 flex items-center justify-center text-xs font-black text-gray-400" id="table-circle-${cell}">0%</div>
                    `;
                }
                floorPlan.appendChild(div);
            });
        });

        // ==========================================
        // 🔄 Firebase 實時監聽
        // ==========================================
        database.ref().on('value', (snapshot) => {
            const root = snapshot.val() || {};
            dbData = root.wedding_guests || {};
            statusState = root.guest_status || {};
            
            updateFloorPlanSummary();
            
            const currentTable = document.getElementById('guest-modal').getAttribute('data-current-table');
            if (currentTable) renderModalContent(currentTable);

            const keyword = document.getElementById('search-input').value;
            if (keyword.trim() !== '') handleSearch();
        });

        // 動態計算每枱入座率
        function updateFloorPlanSummary() {
            Object.keys(dbData).forEach(table => {
                const guests = dbData[table] || [];
                let arrivedCount = 0;

                guests.forEach(name => {
                    if (statusState[`${table}_${name}`]?.arrived) arrivedCount++;
                });
                
                const percent = guests.length ? Math.round((arrivedCount / guests.length) * 100) : 0;
                const circle = document.getElementById(`table-circle-${table}`);
                const card = document.getElementById(`table-card-${table}`);
                
                if (circle && card) {
                    circle.innerText = `${percent}%`;
                    if (percent === 100) {
                        circle.className = "w-12 h-12 rounded-full border-4 border-green-500 bg-green-50 flex items-center justify-center text-xs font-black text-green-600";
                        card.className = card.className.replace(/border-gray-200|border-orange-300/, 'border-green-500');
                    } else if (percent > 0) {
                        circle.className = "w-12 h-12 rounded-full border-4 border-orange-400 bg-orange-50 flex items-center justify-center text-xs font-black text-orange-500";
                        card.className = card.className.replace(/border-gray-200|border-green-500/, 'border-orange-300');
                    } else {
                        circle.className = "w-12 h-12 rounded-full border-4 border-gray-300 bg-white flex items-center justify-center text-xs font-black text-gray-400";
                        card.className = card.className.replace(/border-green-500|border-orange-300/, 'border-gray-200');
                    }
                }
            });
        }

        // ==========================================
        // 🍱 Modal 彈出視窗：補足 12 人與現場加人功能
        // ==========================================
        function openModal(tableNum) {
            document.getElementById('guest-modal').classList.remove('hidden');
            document.getElementById('guest-modal').setAttribute('data-current-table', tableNum);
            renderModalContent(tableNum);
        }

        function closeModal() {
            document.getElementById('guest-modal').classList.add('hidden');
            document.getElementById('guest-modal').setAttribute('data-current-table', "");
        }

        function renderModalContent(tableNum) {
            const container = document.getElementById('modal-content');
            container.innerHTML = '';
            
            const guests = dbData[tableNum] || [];
            document.getElementById('modal-title').innerText = `第 ${tableNum} 桌賓客名單 (${guests.length}/12 位)`;

            // 顯示已存在的賓客
            guests.forEach((name, index) => {
                const key = `${tableNum}_${name}`;
                const state = statusState[key] || { arrived: false, gift: '未交' };

                const row = document.createElement('div');
                row.className = "p-2.5 bg-gray-50 rounded-lg border border-gray-200 flex justify-between items-center gap-2 shadow-sm";
                row.innerHTML = `
                    <span class="font-medium text-gray-800 flex-1">${name}</span>
                    <div class="flex gap-1">
                        <button onclick="toggleArrived('${tableNum}', '${name}', ${state.arrived})" class="px-2.5 py-1.5 text-xs font-bold rounded ${state.arrived ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-600'}">
                            ${state.arrived ? '🟢 已到' : '⚪ 未到'}
                        </button>
                        <button onclick="cycleGift('${tableNum}', '${name}', '${state.gift}')" class="px-2.5 py-1.5 text-xs font-bold rounded ${state.gift !== '未交' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-600'}">
                            ${getGiftLabel(state.gift)}
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });

            // 補充足夠 12 人的空格輸入框
            const emptyCount = 12 - guests.length;
            for (let i = 0; i < emptyCount; i++) {
                const row = document.createElement('div');
                row.className = "p-2 bg-dashed border-2 border-dashed border-gray-300 rounded-lg flex justify-between items-center gap-2 bg-gray-50 opacity-70";
                row.innerHTML = `
                    <span class="text-sm text-gray-400 italic font-medium">[ 空位 ]</span>
                    <button onclick="addNewGuestInline('${tableNum}', ${guests.length})" class="px-3 py-1 text-xs font-bold rounded bg-red-100 text-red-700 hover:bg-red-200 border border-red-200 shadow-sm">
                        + 填入新賓客
                    </button>
                `;
                container.appendChild(row);
            }
        }

        // 現場加人背後邏輯
        function addNewGuestInline(tableNum, currentLength) {
            const newName = prompt("請輸入現場入座的新賓客姓名:");
            if (!newName || newName.trim() === "") return;
            
            // 直接推送到 Firebase 該桌的 Array 尾端
            database.ref(`wedding_guests/${tableNum}/${currentLength}`).set(newName.trim());
        }

        function toggleArrived(table, name, currentStatus) {
            database.ref(`guest_status/${table}_${name}/arrived`).set(!currentStatus);
        }

        function cycleGift(table, name, currentStatus) {
            const stages = ['未交', '人情(封)', '人情(電子)', '送金器'];
            let nextIndex = (stages.indexOf(currentStatus) + 1) % stages.length;
            database.ref(`guest_status/${table}_${name}/gift`).set(stages[nextIndex]);
        }

        function getGiftLabel(status) {
            if (status === '人情(封)') return "✉️ 封";
            if (status === '人情(電子)') return "📱 電子";
            if (status === '送金器') return "👑 金器";
            return "⚪ 禮金";
        }

        // ==========================================
        // 🔍 實時搜尋邏輯
        // ==========================================
        function handleSearch() {
            const input = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');
            const resultsContainer = document.getElementById('search-results');
            const keyword = input.value.trim().toLowerCase();

            if (keyword === '') {
                clearSearch();
                return;
            }

            clearBtn.classList.remove('hidden');
            resultsContainer.classList.remove('hidden');
            resultsContainer.innerHTML = '';

            let hasResults = false;

            Object.keys(dbData).forEach(tableNum => {
                const guests = dbData[tableNum] || [];
                guests.forEach(name => {
                    if (name.toLowerCase().includes(keyword)) {
                        hasResults = true;
                        const key = `${tableNum}_${name}`;
                        const state = statusState[key] || { arrived: false, gift: '未交' };
                        
                        const row = document.createElement('div');
                        row.className = "p-2 bg-red-50 hover:bg-red-100 rounded-lg flex justify-between items-center gap-2 border border-red-100 transition";
                        row.innerHTML = `
                            <div class="flex flex-col text-left cursor-pointer flex-1" onclick="openModalAndHighlight('${tableNum}')">
                                <span class="font-bold text-gray-800">${name}</span>
                                <span class="text-xs text-red-700 font-medium">第 ${tableNum} 桌</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="toggleArrived('${tableNum}', '${name}', ${state.arrived})" class="px-2 py-1 text-xs font-bold rounded ${state.arrived ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-600'}">
                                    ${state.arrived ? '🟢 已到' : '⚪ 未到'}
                                </button>
                                <button onclick="cycleGift('${tableNum}', '${name}', '${state.gift}')" class="px-2 py-1 text-xs font-bold rounded ${state.gift !== '未交' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-600'}">
                                    ${getGiftLabel(state.gift)}
                                </button>
                            </div>
                        `;
                        resultsContainer.appendChild(row);
                    }
                });
            });

            if (!hasResults) {
                resultsContainer.innerHTML = '<p class="text-gray-400 text-sm py-2">找不到此賓客名單</p>';
            }
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search').classList.add('hidden');
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('search-results').innerHTML = '';
        }

        function openModalAndHighlight(tableNum) {
            clearSearch();
            openModal(tableNum);
        }
    </script>
</body>
</html>
