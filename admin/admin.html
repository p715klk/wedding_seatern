<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚宴數據後台管理 (Excel + 多重標籤)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="admin_style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 sm:p-6 overflow-x-hidden">

    <div id="side-panel" class="fixed inset-y-0 left-0 w-80 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 border-r border-gray-200 flex flex-col">
        <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="text-sm font-black text-gray-800 flex items-center gap-1">🛠️ 工具箱與備份</h2>
            <button onclick="toggleSidePanel()" class="text-gray-500 hover:text-gray-700 text-xl font-bold p-1">✕</button>
        </div>
        <div class="p-4 space-y-5 flex-1 overflow-y-auto">
            <div>
                <p class="text-[11px] text-gray-400 mb-2">※ 提示：現已支援多重標籤功能，匯出會完整保留所有自訂欄位。</p>
                <button onclick="exportToCSV()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 rounded text-xs font-bold transition border border-gray-300">
                    📥 匯出目前名單 (CSV)
                </button>
            </div>
        </div>
    </div>

    <div id="side-panel-overlay" class="fixed inset-0 bg-black/30 z-40 hidden" onclick="toggleSidePanel()"></div>

    <div class="max-w-[95%] mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-300 pb-4 mb-4 gap-4">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidePanel()" class="bg-gray-800 hover:bg-gray-950 text-white px-3 py-2 rounded-lg text-xs font-bold shadow transition flex items-center gap-1">
                    ⚙️ 工具箱
                </button>
                <div>
                    <h1 class="text-2xl font-bold text-red-700">📋 賓客名單動態無限標籤後台</h1>
                    <p class="text-xs text-gray-500 mt-1">點擊「➕ 新增標籤欄位」可以橫向無限增加多層分類（標籤2、3、4...），賓客可歸納入多個群組！</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="addNewCustomLabelColumn()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-xs font-bold shadow transition flex items-center gap-1">
                    🏷️ ➕ 新增標籤欄位
                </button>
                <button onclick="addNewGuestRow()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-xs font-bold shadow transition flex items-center gap-1">
                    ➕ 新增賓客
                </button>
                <button onclick="saveAllToFirebase()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md transition flex items-center gap-1">
                    💾 儲存變更 (Sync 畫布)
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden flex flex-col">
            <div class="overflow-x-auto overflow-y-auto max-h-[680px]" id="table-scroll-container">
                <table class="w-full text-left border-collapse min-w-[1100px]">
                    <thead class="bg-gray-100 sticky top-0 z-20 shadow-sm border-b border-gray-200">
                        <tr id="excel-thead-tr">
                            </tr>
                    </thead>
                    <tbody id="excel-tbody" class="divide-y divide-gray-100 text-gray-700">
                        <tr><td class="text-center py-8 text-gray-400 font-bold">⏳ 正在從 Firebase 載入名單數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="text-center text-xs text-gray-400 mt-6 pb-4">
            Wedding Dynamic Label Manager Panel v4.0
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/50 z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-gray-100">
            <h3 class="text-base font-bold text-gray-900 mb-2">➕ 新增標籤內之選單選項</h3>
            <p class="text-xs text-gray-500 mb-4">請輸入你想為此標籤欄新增的選項名稱：</p>
            <input type="text" id="custom-category-input" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeCustomCategoryDialog(false)" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold transition">取消</button>
                <button onclick="closeCustomCategoryDialog(true)" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow transition">確認新增</button>
            </div>
        </div>
    </div>

    <script src="admin_config.js"></script>
    <script src="admin_api.js"></script>
    <script src="admin_ui.js"></script>
</body>
</html>
