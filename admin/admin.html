<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 賓客名單管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="admin_style.css">
</head>
<body class="admin-page bg-gray-100 text-gray-800 font-sans h-screen flex flex-col p-4 overflow-hidden">

    <div class="w-full max-w-[98%] mx-auto flex flex-col h-full space-y-3">
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center border-b border-gray-300 pb-3 flex-shrink-0 gap-3">
            <div class="flex flex-wrap items-baseline gap-x-2 gap-y-0.5 min-w-0 flex-1 lg:flex-initial">
                <h1 class="text-xl font-bold text-red-700 shrink-0">📋 賓客名單管理後台</h1>
                <span class="header-hint text-[11px] text-gray-500 font-normal leading-snug">按住 ☰ 拖拉排序；標籤欄支援多選(用＋加入標籤)；表頭欄位分界線可拖拉調整欄寬。修改後需儲存變更。</span>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto">
                <button onclick="addNewGuestRow()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition">
                    ➕ 新增賓客
                </button>
                <button id="btn-save-all" onclick="saveAllToFirebase({ successMessage: '✨ 【後台數據同步成功】！已完美推送至畫布。' })" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow transition">
                    💾 儲存變更
                </button>
                
                <div class="flex items-center bg-gray-200 rounded-lg p-1 border border-gray-300 gap-1">
                    <input type="file" id="csv-file-input" accept=".csv" class="hidden" onchange="importCSVAction()">
                    <button onclick="openCSVFilePicker()" class="bg-gray-600 hover:bg-gray-700 text-white px-2 py-1 rounded text-xs font-bold transition">
                        📥 匯入 CSV
                    </button>
                    <button onclick="exportToCSV()" class="bg-gray-600 hover:bg-gray-700 text-white px-2 py-1 rounded text-xs font-bold transition">
                        📤 匯出 CSV
                    </button>
                </div>

                <a href="seating.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition text-center flex items-center justify-center">
                    🦢 前往畫布排位
                </a>
                <a href="../index.html" class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition text-center flex items-center justify-center">
                    🏠 前往點名首頁
                </a>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow border border-gray-200 flex-1 min-h-0 flex flex-col overflow-hidden">
            <div class="overflow-auto flex-1 w-full" id="table-scroll-container">
                <table class="w-full text-left border-collapse table-fixed min-w-[1200px]" id="excel-table">
                    <thead class="bg-gray-50 sticky top-0 z-20 shadow-sm border-b border-gray-200">
                        <tr id="excel-thead-tr">
                            </tr>
                    </thead>
                    <tbody id="excel-tbody" class="divide-y divide-gray-100 text-sm font-medium text-gray-700">
                        <tr><td colspan="8" class="text-center py-8 text-gray-400 font-bold">⏳ 正在從 Firebase 載入名單數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="text-right text-[10px] text-gray-400 font-mono flex-shrink-0 px-1">
            Wedding Manager Panel v5.0 (多選標籤)
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/50 z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-gray-100">
            <h3 class="text-base font-bold text-gray-900 mb-2">➕ 新增自訂選項</h3>
            <p class="text-xs text-gray-500 mb-4">請輸入你想加入標籤清單的新選項名稱：</p>
            <input type="text" id="custom-category-input" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeCustomCategoryDialog(false)" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold">取消</button>
                <button onclick="closeCustomCategoryDialog(true)" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow">確認新增</button>
            </div>
        </div>
    </div>

    <div id="leave-page-dialog-overlay" class="fixed inset-0 bg-black/50 z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-gray-100">
            <h3 class="text-base font-bold text-gray-900 mb-2">⚠️ 有未儲存的改動</h3>
            <p class="text-xs text-gray-500 mb-4 leading-relaxed">你尚未按「儲存變更」。若現在離開，修改將不會同步到畫布同點名頁。</p>
            <div class="flex flex-col gap-2">
                <button type="button" onclick="confirmLeaveAdminPage('save')" class="w-full px-3 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow">💾 儲存並離開</button>
                <button type="button" onclick="confirmLeaveAdminPage('discard')" class="w-full px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold">不儲存，離開</button>
                <button type="button" onclick="confirmLeaveAdminPage('stay')" class="w-full px-3 py-2 bg-white hover:bg-gray-50 text-gray-500 rounded-lg text-xs font-bold border border-gray-200">留在此頁</button>
            </div>
        </div>
    </div>

    <div id="delete-tag-dialog-overlay" class="fixed inset-0 bg-black/50 z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-gray-100">
            <h3 class="text-base font-bold text-gray-900 mb-2">🗑️ 刪除標籤</h3>
            <p class="text-xs text-gray-500 mb-3">從標籤清單移除；若有賓客仍使用該標籤，將無法刪除。</p>
            <label class="block text-xs font-bold text-gray-500 mb-1">選擇要刪除的標籤：</label>
            <select id="delete-tag-select" onchange="updateDeleteTagUsageHint()" class="w-full border border-gray-300 rounded-lg p-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-red-500"></select>
            <p id="delete-tag-usage-hint" class="text-xs mb-4 text-gray-600"></p>
            <div class="flex justify-end gap-2">
                <button onclick="closeDeleteTagDialog(false)" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold">取消</button>
                <button id="btn-confirm-delete-tag" onclick="closeDeleteTagDialog(true)" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow disabled:opacity-40 disabled:cursor-not-allowed" disabled>確認刪除</button>
            </div>
        </div>
    </div>

    <div id="csv-import-dialog-overlay" class="fixed inset-0 bg-black/50 z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full border border-gray-100 max-h-[90vh] flex flex-col">
            <div class="p-5 border-b border-gray-100 flex-shrink-0">
                <h3 class="text-base font-bold text-gray-900 mb-1">📥 匯入 CSV 預覽</h3>
                <p id="csv-import-file-name" class="text-xs text-gray-500"></p>
            </div>

            <div class="p-5 space-y-4 overflow-y-auto flex-1 min-h-0">
                <fieldset class="space-y-2">
                    <legend class="text-xs font-bold text-gray-600 mb-1">匯入模式</legend>
                    <label class="flex items-start gap-2 p-2 rounded-lg border border-green-200 bg-green-50/60 cursor-pointer">
                        <input type="radio" name="csv-import-mode" value="merge" class="mt-0.5" checked onchange="refreshCSVImportPreview()">
                        <span class="text-xs leading-relaxed">
                            <span class="font-bold text-gray-900">合併匯入（建議）</span><br>
                            <span class="text-gray-600">以「姓名 + 來源 + 標籤」配對；更新 CSV 有嘅人、加入新賓客，唔會刪走 CSV 冇寫到嘅人。</span>
                        </span>
                    </label>
                    <label class="flex items-start gap-2 p-2 rounded-lg border border-red-200 bg-red-50/40 cursor-pointer">
                        <input type="radio" name="csv-import-mode" value="replace" class="mt-0.5" onchange="refreshCSVImportPreview()">
                        <span class="text-xs leading-relaxed">
                            <span class="font-bold text-gray-900">完全取代</span><br>
                            <span class="text-gray-600">用 CSV 成個取代名單；CSV 冇寫到嘅人會被刪除。</span>
                        </span>
                    </label>
                </fieldset>

                <div id="csv-import-preview-summary" class="grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
                <div id="csv-import-preview-warnings" class="hidden text-xs rounded-lg border border-amber-200 bg-amber-50 text-amber-900 p-3"></div>
                <div id="csv-import-preview-details" class="space-y-3 text-xs"></div>
            </div>

            <div class="p-5 border-t border-gray-100 flex justify-end gap-2 flex-shrink-0">
                <button type="button" onclick="closeCSVImportDialog(false)" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold">取消</button>
                <button type="button" id="btn-confirm-csv-import" onclick="closeCSVImportDialog(true)" class="px-4 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow">確認匯入</button>
            </div>
        </div>
    </div>

    <script src="admin_config.js?v=19"></script>
    <script src="admin_api.js?v=19"></script>
    <script src="admin_ui.js?v=19"></script>
</body>
</html>
