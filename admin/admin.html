<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚宴數據後台管理 (Excel + 多重標籤)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="admin_style.css">
    <style>
        /* 欄位手動拉伸線樣式 */
        .resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            cursor: col-resize;
            user-select: none;
            height: 100%;
            z-index: 30;
        }
        .resizer:hover, .resizing {
            border-right: 3px solid #ef4444;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col p-4 overflow-hidden">

    <div class="w-full max-w-[98%] mx-auto flex flex-col h-full space-y-3">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-300 pb-3 flex-shrink-0 gap-3">
            <div>
                <h1 class="text-xl font-bold text-red-700">📋 賓客名單動態多重標籤管理後台</h1>
                <p class="text-[11px] text-gray-500 mt-0.5">按住 ☰ 拖拉改變排序，點擊「➕ 新增標籤欄位」可無限橫向擴充分類，表頭邊緣可手拉調整闊度。</p>
            </div>
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button onclick="addNewCustomLabelColumn()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition">
                    🏷️ ➕ 新增標籤欄位
                </button>
                <button onclick="addNewGuestRow()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition">
                    ➕ 新增賓客
                </button>
                <button onclick="saveAllToFirebase()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow transition">
                    💾 儲存變更 (Sync 畫布)
                </button>
                <a href="seating.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition text-center flex items-center justify-center">
                    🦢 前往畫布排位
                </a>
                <a href="../index.html" class="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow transition text-center flex items-center justify-center">
                    🏠 前往點名首頁
                </a>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow border border-gray-200 flex-1 min-h-0 flex flex-col overflow-hidden">
            <div class="overflow-auto flex-1 w-full" id="table-scroll-container">
                <table class="w-full text-left border-collapse table-fixed min-w-[1200px]" id="excel-table">
                    <thead class="bg-gray-50 sticky top-0 z-20 shadow-sm border-b border-gray-200">
                        <tr id="excel-thead-tr">
                            </tr>
                    </thead>
                    <tbody id="excel-tbody" class="divide-y divide-gray-100 text-xs font-medium text-gray-700">
                        <tr><td class="text-center py-8 text-gray-400 font-bold">⏳ 正在從 Firebase 載入名單數據...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="bg-gray-800 text-gray-200 p-3 rounded-xl border border-gray-700 flex-shrink-0 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <span class="text-xs font-bold text-gray-400">📥 批次 CSV 覆蓋:</span>
                <input type="file" id="csv-file-input" accept=".csv" class="text-xs text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-gray-600 file:text-white hover:file:bg-gray-500">
                <button onclick="importCSVAction()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-2 py-1 rounded text-xs font-bold transition">執行匯入</button>
            </div>
            <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                <button onclick="exportToCSV()" class="bg-gray-600 hover:bg-gray-500 text-white px-3 py-1 rounded text-xs font-bold transition">📥 匯出目前名單 (CSV)</button>
                <span class="text-[11px] text-gray-500 font-mono">Panel v4.5</span>
            </div>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/50 z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-gray-100">
            <h3 class="text-base font-bold text-gray-900 mb-2">➕ 新增自訂選項</h3>
            <p class="text-xs text-gray-500 mb-4">請輸入你想為此標籤欄位新增的選項名稱：</p>
            <input type="text" id="custom-category-input" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeCustomCategoryDialog(false)" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold">取消</button>
                <button onclick="closeCustomCategoryDialog(true)" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow">確認新增</button>
            </div>
        </div>
    </div>

    <script src="admin_config.js"></script>
    <script src="admin_api.js"></script>
    <script src="admin_ui.js"></script>
</body>
</html>
