<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚宴數據後台管理 (Excel + 拖拉排序)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <link rel="stylesheet" href="index_style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 sm:p-6 overflow-x-hidden">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-300 pb-4 mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-red-700">📋 賓客名單 Excel 管理後台</h1>
                <p class="text-xs text-gray-500 mt-1">按住 ☰ 即可上下拖拉改變排序，完成後記得點擊儲存變更</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto justify-end">
                <button onclick="addNewRow()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition">
                    ➕ 新增賓客一行
                </button>
                <button onclick="saveExcelToFirebase()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg text-sm font-black tracking-wider shadow transition">
                    💾 儲存變更
                </button>
                
                <button onclick="toggleSettingsModal(true)" class="bg-gray-700 hover:bg-gray-800 text-white px-3 py-2 rounded-lg text-sm font-bold shadow transition flex items-center justify-center gap-1">
                    ⚙️ 設定選單
                </button>
                
                <a href="../index.html" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition text-center">
                    ⬅️ 返回平面圖
                </a>
            </div>
        </header>

        <div id="table-scroll-container" class="bg-white rounded-xl shadow border border-gray-200 overflow-x-auto max-h-[72vh] scroll-smooth">
            <table class="w-full text-left border-collapse excel-table min-w-[750px]">
                <thead class="bg-gray-200 text-gray-700 sticky top-0 z-10 text-sm font-bold">
                    <tr>
                        <th class="p-2.5 w-12 text-center bg-gray-300">拖動</th>
                        <th class="p-2.5 w-16 text-center bg-gray-300">桌次</th>
                        <th class="p-2.5 w-20 text-center bg-gray-300">排序</th>
                        <th class="p-2.5 bg-gray-300">賓客姓名</th>
                        <th class="p-2.5 w-32 bg-gray-300">男方/女方</th>
                        <th class="p-2.5 w-48 bg-gray-300">分類 (如: LK, 家人)</th>
                        <th class="p-2.5 w-24 text-center bg-gray-300">操作</th>
                    </tr>
                </thead>
                <tbody id="excel-tbody" class="text-sm divide-y divide-gray-100">
                    <tr>
                        <td colspan="7" class="p-8 text-center text-gray-400">載入 Firebase 數據中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="settings-sidebar" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black bg-opacity-40 transition-opacity" onclick="toggleSettingsModal(false)"></div>
        
        <div class="absolute inset-y-0 right-0 w-80 bg-gray-800 text-gray-100 p-6 shadow-2xl flex flex-col justify-between transform transition-transform">
            <div>
                <div class="flex justify-between items-center border-b border-gray-700 pb-3 mb-6">
                    <h2 class="text-lg font-bold text-red-400 flex items-center gap-2">⚙️ 後台進階設定</h2>
                    <button onclick="toggleSettingsModal(false)" class="text-gray-400 hover:text-white text-2xl font-bold">&times;</button>
                </div>
                
                <div class="space-y-4">
                    <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">數據匯入 (Data Import)</h3>
                        <input type="file" id="csv-file-input" accept=".csv" class="hidden" onchange="handleCSVUpload(this)">
                        <button onclick="document.getElementById('csv-file-input').click(); toggleSettingsModal(false);" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow transition text-center block">
                            📂 匯入 Google Excel (CSV)
                        </button>
                        <p class="text-[11px] text-gray-500 mt-2">※ 匯入會暫時覆蓋目前表格，確認無誤後需按「儲存變更」正式推上 Firebase。</p>
                    </div>

                    <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">數據備份 (Data Export)</h3>
                        <button onclick="exportTableToCSV()" class="w-full bg-orange-600 hover:bg-orange-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow transition text-center block">
                            📥 匯出目前名單 (CSV)
                        </button>
                        <p class="text-[11px] text-gray-500 mt-2">※ 將現時後台排序好嘅名單打包下載，可用作 Excel 存檔或列印備用。</p>
                    </div>
                </div>
            </div>
            
            <div class="text-center text-xs text-gray-500 border-t border-gray-700 pt-4">
                Wedding Guest Manager Panel v2.0
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
