<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>自製鷗鷗 - 可視化圓枱排位畫布</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="admin_style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        html, body.seating-touch {
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-touch-callout: none;
        }
        .workspace-canvas {
            --zoom: 1;
            background-color: #f3f4f6;
            background-image:
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            position: absolute;
            width: 5000px;
            height: 4000px;
            transform-origin: 0 0;
            cursor: grab;
        }
        .workspace-canvas:active { cursor: grabbing; }
        .draggable-table {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: calc(420px * var(--zoom));
        }
        .draggable-table * { pointer-events: auto; }
        .draggable-table.is-dragging { z-index: 1000; }

        .table-plate {
            position: relative;
            width: calc(420px * var(--zoom));
            height: calc(420px * var(--zoom));
            border-radius: 50%;
            background: #ffffff;
            border: calc(1px * var(--zoom)) solid #e5e7eb;
            cursor: grab;
            overflow: visible;
        }
        .table-plate:active { cursor: grabbing; }

        .hub-ring {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 3;
        }
        .hub-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            pointer-events: none;
            user-select: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: calc(2px * var(--zoom));
            line-height: 1.15;
            max-width: calc(110px * var(--zoom));
        }
        @media (hover: none) and (pointer: coarse) {
            .hub-center {
                pointer-events: auto;
                cursor: pointer;
                min-width: calc(88px * var(--zoom));
                min-height: calc(56px * var(--zoom));
                padding: calc(6px * var(--zoom));
            }
        }
        .hub-title {
            font-size: calc(18px * var(--zoom));
            font-weight: 800;
            color: #1f2937;
            white-space: nowrap;
            line-height: 1.1;
            pointer-events: auto;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            padding: calc(4px * var(--zoom)) calc(8px * var(--zoom));
            border-radius: calc(6px * var(--zoom));
        }
        .hub-title:active {
            background: rgba(99, 102, 241, 0.08);
        }
        .hub-category {
            font-size: calc(10px * var(--zoom));
            font-weight: 600;
            color: #6b7280;
            line-height: 1.25;
            word-break: break-word;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            overflow: hidden;
        }
        .hub-num {
            font-size: calc(10px * var(--zoom));
            font-weight: 500;
            color: #9ca3af;
            line-height: 1;
        }

        .seat-slot {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 4;
        }
        .guest-seat-circle {
            width: calc(var(--guest-size, 64px) * var(--zoom));
            height: calc(var(--guest-size, 64px) * var(--zoom));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: calc(3px * var(--zoom));
            font-size: calc(var(--guest-size, 64px) * var(--name-font-ratio, 0.19) * var(--zoom));
            font-weight: 700;
            cursor: grab;
            line-height: 1.1;
            overflow: hidden;
        }
        .guest-seat-circle.side-male {
            background: #bfdbfe;
            color: #1e3a8a;
        }
        .guest-seat-circle.side-female {
            background: #fecdd3;
            color: #9f1239;
        }
        .guest-seat-circle:active { cursor: grabbing; }
        .seat-empty {
            width: calc(var(--guest-size, 64px) * var(--zoom));
            height: calc(var(--guest-size, 64px) * var(--zoom));
            border-radius: 50%;
            border: calc(1px * var(--zoom)) solid #f3f4f6;
            background: rgba(255,255,255,0.6);
            color: #d1d5db;
            font-size: calc(9px * var(--zoom));
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }
        .guest-name-text {
            display: inline-block;
            overflow: hidden;
            width: auto;
            max-width: calc((var(--guest-size, 64px) - 6px) * var(--zoom));
            line-height: 1.1;
            font-size: inherit;
            vertical-align: middle;
        }
        .guest-name-text.name-cjk {
            word-break: keep-all;
        }
        .guest-name-text.name-latn {
            word-break: normal;
            overflow-wrap: normal;
            letter-spacing: -0.02em;
        }
        .guest-name-text .name-subline {
            white-space: nowrap;
            display: inline-block;
            max-width: 100%;
        }

        /* 電腦版加大字體（側欄 & 彈窗 & 枱上座位） */
        @media (min-width: 1024px) {
            .pool-guest-chip { font-size: 14px !important; padding: 10px 12px !important; }
            .pool-group-title { font-size: 13px !important; }
            .pool-section-label { font-size: 13px !important; }
            .sidebar-title { font-size: 1.35rem !important; }
            #guest-detail-modal .modal-form-text { font-size: 14px; }
            #guest-detail-modal .modal-form-text input,
            #guest-detail-modal .modal-form-text select { font-size: 14px !important; }
            #guest-detail-modal .modal-form-label { font-size: 12px !important; }
            #guest-detail-modal .modal-heading { font-size: 1rem !important; }
            #guest-detail-modal #edit-guest-tags .tag-chip,
            #guest-detail-modal #edit-guest-tags .row-tag-add-select { font-size: 14px !important; }
        }

        /* 彈窗標籤：跟隨表單字級，唔用 10px */
        #guest-detail-modal #edit-guest-tags .tag-chip,
        #guest-detail-modal #edit-guest-tags .row-tag-add-select {
            font-size: 0.875rem;
        }

        /* Side panel 覆蓋式收合 — 滑入滑出 + 內容淡入淡出 */
        #sidebar-panel {
            width: 320px;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        #sidebar-content {
            pointer-events: auto;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.28s ease 0.06s, visibility 0.28s ease 0.06s;
        }
        #sidebar-panel.collapsed {
            transform: translateX(-100%);
        }
        #sidebar-panel.collapsed #sidebar-content {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        #sidebar-panel.sidebar-no-transition,
        #sidebar-panel.sidebar-no-transition #sidebar-content {
            transition: none !important;
        }
        #sidebar-toggle-btn {
            pointer-events: auto;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #canvas-viewport, #main-canvas, .workspace-canvas {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-viewport { cursor: grab; }
        #canvas-viewport:active { cursor: grabbing; }

        .guest-drag-ghost {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            padding: 8px 12px;
            border-radius: 999px;
            background: #bfdbfe;
            color: #1e3a8a;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            transform: translate(-50%, -50%);
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        body.tables-position-locked .table-plate {
            cursor: default !important;
        }
        body.tables-position-locked .table-plate:active {
            cursor: default !important;
        }
        #btn-lock-tables.is-active {
            background: #fef3c7 !important;
            border-color: #f59e0b !important;
            color: #b45309 !important;
        }
        #seating-app > header {
            position: relative;
            z-index: 100;
            overflow: visible;
        }
        #print-menu-wrap {
            position: relative;
            z-index: 110;
        }
        #print-menu {
            min-width: 11rem;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #print-menu.is-fixed {
            position: fixed;
            z-index: 120;
        }
        .print-image-layout {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background: #fff;
        }
        .print-image-layout img {
            display: block;
            width: 100%;
            height: 100%;
        }
        .print-raster-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            min-height: 240px;
            font-weight: 700;
            color: #64748b;
        }

        /* 頁內列印預覽（唔開新分頁） */
        #print-preview-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            flex-direction: column;
            background: #e2e8f0;
        }
        body.print-preview-open #print-preview-overlay {
            display: flex !important;
        }
        #print-preview-sheet {
            background: #fff;
            box-shadow: 0 8px 30px rgba(15, 23, 42, 0.12);
            box-sizing: border-box;
            overflow: visible;
        }
        #print-preview-viewport {
            transform-origin: top center;
        }
        body[data-print-orientation="portrait"] #print-preview-sheet {
            width: 756px;
            height: 1085px;
            max-width: calc(100vw - 3rem);
        }
        body[data-print-orientation="landscape"] #print-preview-sheet {
            width: 1085px;
            height: 756px;
            max-width: calc(100vw - 3rem);
        }
        .print-tables-layout {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background: #fff;
        }
        .print-tables-layout .draggable-table {
            pointer-events: none;
        }
        .print-tables-layout .seat-slot,
        .print-tables-layout .hub-center,
        .print-tables-layout .hub-title {
            cursor: default;
        }
        .print-orient-btn.is-active {
            background: #fef3c7;
            border-color: #d97706;
            color: #92400e;
        }
        .print-floor {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background: #fff;
        }
        .print-table-unit {
            position: absolute;
            box-sizing: border-box;
        }
        .print-table-title {
            text-align: center;
            font-weight: 800;
            color: #111;
            line-height: 1.1;
            margin-bottom: 0.35em;
        }
        .print-table-circle {
            border: 2px solid #111;
            border-radius: 50%;
            background: #fff;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .print-name-grid {
            width: 86%;
            text-align: center;
            line-height: 1.22;
            color: #111;
        }
        .print-name-item {
            display: block;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .print-empty {
            color: #94a3b8;
        }

        @media print {
            body.print-preview-open #seating-app,
            body.print-preview-open #guest-detail-modal,
            body.print-preview-open #custom-dialog-overlay,
            body.print-preview-open #table-settings-modal {
                display: none !important;
            }
            body.print-preview-open #print-preview-overlay {
                display: block !important;
                position: static;
                background: #fff;
            }
            body.print-preview-open .print-preview-toolbar {
                display: none !important;
            }
            body.print-preview-open #print-preview-scroll {
                overflow: visible !important;
                padding: 0 !important;
                background: #fff !important;
            }
            body.print-preview-open #print-preview-viewport {
                zoom: 1 !important;
                transform: none !important;
            }
            body.print-preview-open #print-preview-sheet {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            body.print-preview-open .print-image-layout img {
                width: 100% !important;
                height: auto !important;
                max-width: 100%;
            }
        }

        @media (max-width: 768px) {
            #sidebar-panel { width: min(88vw, 300px); }
            #sidebar-content { width: min(88vw, 300px) !important; }
            .header-actions .hide-mobile { display: none; }
            #global-stats { display: none; }
            header h1 span:last-child { font-size: 0.85rem; }
            .pool-guest-chip { font-size: 15px !important; padding: 12px 10px !important; }
        }
    </style>
</head>
<body class="seating-touch bg-slate-900 text-slate-800 font-sans h-screen overflow-hidden">

<div id="seating-app" class="h-full flex flex-col overflow-hidden">

    <header class="bg-white text-slate-800 h-14 px-4 shadow-sm flex justify-between items-center shrink-0 border-b border-slate-200 z-30">
        <div class="flex items-center gap-3">
            <h1 class="text-base font-black tracking-wider text-slate-900 flex items-center gap-1.5">
                <span class="text-xl">🦢</span> 可視化圓枱排位畫布
            </h1>
            <div class="text-[11px] bg-slate-100 px-2.5 py-1 rounded-full text-slate-600 font-bold" id="global-stats">載入中...</div>
        </div>
        <div class="header-actions flex items-center gap-1.5 sm:gap-2">
            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-lg overflow-hidden h-8 text-xs">
                <button onclick="zoomCanvas(0.9)" class="px-2.5 hover:bg-slate-200 font-bold text-slate-500">－</button>
                <span id="zoom-percent" class="px-2 font-mono text-slate-700 font-bold min-w-[45px] text-center">100%</span>
                <button onclick="zoomCanvas(1.1)" class="px-2.5 hover:bg-slate-200 font-bold text-slate-500">＋</button>
            </div>
            <button onclick="fitViewToTables()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2 sm:px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-200 transition" title="將視野置中到所有枱">
                🎯<span class="hide-mobile"> 置中</span>
            </button>
            <button onclick="createNewTableAction()" class="hide-mobile bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition">
                ➕ 新增圓枱
            </button>
            <button type="button" id="btn-lock-tables" onclick="toggleTablePositionLock()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2 sm:px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-200 transition" title="鎖定枱位（防止拖動）">
                🔓<span class="hide-mobile"> 鎖枱</span>
            </button>
            <div class="relative" id="print-menu-wrap">
                <button type="button" id="btn-print-menu" onclick="togglePrintMenu(event)" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2 sm:px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-200 transition">
                    🖨️<span class="hide-mobile"> 打印</span>
                </button>
                <div id="print-menu" class="hidden absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-lg shadow-lg py-1 text-xs font-bold overflow-hidden">
                    <button type="button" data-print-action="canvas" class="w-full text-left px-3 py-2 hover:bg-slate-50 active:bg-slate-100 text-slate-700">🖼️ 打印畫面（全部枱位）</button>
                    <button type="button" data-print-action="guest-list" class="w-full text-left px-3 py-2 hover:bg-slate-50 active:bg-slate-100 text-slate-700 border-t border-slate-100">📋 打印圓枱名單（文字版）</button>
                </div>
            </div>
            <a href="admin.html" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2 sm:px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-200 transition">
                📋<span class="hide-mobile"> 返回</span>
            </a>
        </div>
    </header>

    <div class="flex-1 relative overflow-hidden w-full bg-slate-100">

        <main class="absolute inset-0 overflow-hidden" id="canvas-viewport">
            <div class="workspace-canvas" id="main-canvas" ondragover="allowDrop(event)"></div>
        </main>

        <aside id="sidebar-panel" class="absolute left-0 top-0 bottom-0 z-20">
            <div id="sidebar-content" class="bg-white border-r border-slate-200 flex flex-col h-full shadow-xl overflow-hidden w-[320px]" ondragover="allowDrop(event)" ondrop="handleDropTrash(event)">

                <div class="p-4 bg-white shrink-0 border-b border-slate-100">
                    <h2 class="sidebar-title text-xl font-black text-slate-800 tracking-wide">未安排名單</h2>
                </div>

                <div class="flex-1 overflow-y-auto bg-slate-50/40 no-scrollbar pb-12" id="single-scroll-pool" ondragover="allowDrop(event)" ondrop="handleDropTrash(event)">

                    <div class="px-4 py-2 bg-blue-50/60 flex items-center sticky top-0 border-b border-blue-100 z-10 shadow-sm">
                        <span class="pool-section-label text-sm font-black text-blue-700 tracking-wider">♂️ 男方名單</span>
                    </div>
                    <div id="pool-male" class="p-4 space-y-4 min-h-[60px]"></div>

                    <div class="px-4 py-2 bg-rose-50/60 flex items-center sticky top-0 border-b border-rose-100 border-t border-slate-100 z-10 shadow-sm">
                        <span class="pool-section-label text-sm font-black text-rose-700 tracking-wider">♀️ 女方名單</span>
                    </div>
                    <div id="pool-female" class="p-4 space-y-4 min-h-[60px]"></div>

                </div>
            </div>

            <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="absolute -right-5 top-1/2 -translate-y-1/2 w-5 h-20 bg-indigo-600 text-white border border-indigo-500 rounded-r-xl shadow-md flex items-center justify-center font-black text-[10px] hover:bg-indigo-700 z-30">
                <span id="sidebar-toggle-icon">◀</span>
            </button>
        </aside>

    </div>

</div>

    <div id="guest-detail-modal" class="fixed inset-0 bg-slate-950/40 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-slate-100">
            <div class="flex justify-between items-start mb-3">
                <h3 class="modal-heading text-base font-black text-slate-900">✏️ 編輯賓客資料</h3>
                <button onclick="closeGuestModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
            </div>
            
            <div class="modal-form-text space-y-3 text-sm bg-slate-50 p-3 rounded-lg border border-slate-100">
                <div>
                    <label class="modal-form-label block text-xs font-bold text-slate-400 mb-1">姓名：</label>
                    <input type="text" id="edit-guest-name" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                </div>
                <div>
                    <label class="modal-form-label block text-xs font-bold text-slate-400 mb-1">標籤（可多選）：</label>
                    <div id="edit-guest-tags" class="row-multi-tags flex flex-wrap items-center gap-1 min-h-[36px] bg-white border border-slate-200 rounded-lg p-2" data-column-key="group"></div>
                </div>
                <div>
                    <label class="modal-form-label block text-xs font-bold text-slate-400 mb-1">來源：</label>
                    <select id="edit-guest-side" onchange="refreshModalTagColors()" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="男方">男方</option>
                        <option value="女方">女方</option>
                    </select>
                </div>
                <div class="flex justify-between items-center pt-1">
                    <span class="text-slate-400 font-bold">目前席位：</span> 
                    <span id="md-guest-seat" class="font-mono bg-amber-100 px-2 py-0.5 rounded text-amber-800 font-bold"></span>
                </div>
            </div>
            
            <div class="space-y-2 mt-4">
                <button onclick="saveGuestChangesAction()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold shadow-sm transition">
                    💾 儲存並更新資料
                </button>
                <button id="btn-remove-from-seat" onclick="removeGuestFromSeatAction()" class="w-full py-2.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg text-sm font-bold transition">
                    ↩️ 移出席位 (退回未安排)
                </button>
            </div>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-gray-100">
            <h3 class="text-base font-bold text-gray-900 mb-2">➕ 新增自訂選項</h3>
            <p class="text-xs text-gray-500 mb-4">請輸入你想加入標籤清單的新選項名稱：</p>
            <input type="text" id="custom-category-input" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeCustomCategoryDialog(false)" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-xs font-bold">取消</button>
                <button onclick="closeCustomCategoryDialog(true)" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold shadow">確認新增</button>
            </div>
        </div>
    </div>

    <div id="table-settings-modal" class="fixed inset-0 bg-slate-950/40 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full p-5 border border-slate-100">
            <h3 class="text-sm font-black text-slate-900 mb-3" id="modal-table-title">⚙️ 圓枱設定</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">枱號 (可跳過 4、14 等)：</label>
                    <input type="number" id="modal-table-num" min="1" max="99" autocomplete="off" class="w-full border border-slate-200 rounded-lg p-2 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">枱標籤（顯示於枱中央）：</label>
                    <input type="text" id="modal-table-label" placeholder="例如：父親朋友、母親朋友、SU" autocomplete="off" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">此桌座位數量 (人數上限)：</label>
                    <input type="number" id="modal-max-seats" min="1" max="16" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div class="flex justify-between items-center mt-5 pt-3 border-t border-slate-100">
                <button onclick="deleteTableAction()" class="px-2.5 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-md text-xs font-bold transition">🗑️ 刪除此桌</button>
                <div class="flex gap-2">
                    <button onclick="closeSettingsModal()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md text-xs font-bold">取消</button>
                    <button onclick="saveTableSettingsAction()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md text-xs font-bold">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="print-preview-overlay" class="hidden">
        <div class="print-preview-toolbar min-h-14 bg-white border-b border-slate-200 flex flex-wrap items-center justify-between gap-2 px-4 py-2 shrink-0">
            <button type="button" onclick="closePrintPreview()" class="text-sm font-bold text-slate-600 hover:text-slate-900 shrink-0">← 返回畫布</button>
            <div class="flex flex-wrap items-center justify-center gap-2 sm:gap-3">
                <span class="text-sm font-black text-slate-800">列印預覽</span>
                <div class="flex items-center bg-slate-100 rounded-lg border border-slate-200 text-xs font-bold">
                    <button type="button" onclick="stepPrintPreviewZoom(-0.2)" class="px-2.5 py-1.5 hover:bg-slate-200 text-slate-500">－</button>
                    <span id="print-zoom-percent" class="px-2 font-mono text-slate-700 min-w-[42px] text-center">100%</span>
                    <button type="button" onclick="stepPrintPreviewZoom(0.2)" class="px-2.5 py-1.5 hover:bg-slate-200 text-slate-500">＋</button>
                    <button type="button" onclick="fitPrintPreviewZoom()" class="px-2 py-1.5 hover:bg-slate-200 text-slate-500 border-l border-slate-200" title="縮細預覽以睇晒成張 A4">⊡</button>
                </div>
                <div class="flex items-center bg-slate-100 rounded-lg border border-slate-200 text-xs font-bold overflow-hidden">
                    <button type="button" id="btn-print-portrait" onclick="setPrintOrientation('portrait')" class="print-orient-btn px-2.5 py-1.5 hover:bg-slate-200 text-slate-600">直向</button>
                    <button type="button" id="btn-print-landscape" onclick="setPrintOrientation('landscape')" class="print-orient-btn px-2.5 py-1.5 hover:bg-slate-200 text-slate-600 border-l border-slate-200">橫向</button>
                </div>
            </div>
            <button type="button" onclick="executePrintPreview()" class="bg-amber-800 hover:bg-amber-900 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm shrink-0">列印</button>
        </div>
        <div id="print-preview-scroll" class="flex-1 overflow-auto p-6 flex justify-center items-start min-h-0">
            <div id="print-preview-viewport">
                <div id="print-preview-sheet"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="seating.js?v=4"></script>
</body>
</html>
